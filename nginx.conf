events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # 1. The Main Portfolio UI
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        location / {
            # Target container name: portfolio_ui
            proxy_pass http://portfolio_ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 2. The Secure Task App
    server {
        listen 80;
        server_name tasks.yourdomain.com;

        location / {
            # Target container name updated to match folder intent
            proxy_pass http://secure_task_app:8000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 3. Xrtwsha
    server {
        listen 80;
        server_name xrtwsha.yourdomain.com;

        location / {
            # Target container name updated to match the correct naming convention
            proxy_pass http://xrtwsha_app:3000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}